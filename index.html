<!DOCTYPE html>
<html lang="de" class="bg-bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Volleyball Turniere – FBG Erlangen</title>
<meta name="description" content="Regelmäßige Hallen- und Beach-Volleyball-Turniere der FBG Erlangen. Termine, Anmeldung, Teams und alle Infos auf einen Blick." />
<meta name="theme-color" content="#0f1623" />

<!-- ============================================================= -->
<!--  GESAMTES STYLING                                              -->
<!-- ============================================================= -->
<style>
  /* ---------- Design Tokens ---------- */
  :root {
    --bg:            #0f1623;   /* Deep Slate / Dark Charcoal */
    --bg-2:          #131c2c;
    --card:          rgba(255, 255, 255, 0.045);
    --card-border:   rgba(255, 255, 255, 0.10);
    --text:          #eef2f7;   /* sanftes Weiß */
    --text-muted:    #97a3b6;   /* Hellgrau */
    --accent:        #ffb02e;   /* Cyber-Gold / Match-Amber */
    --accent-soft:   rgba(255, 176, 46, 0.14);
    --accent-glow:   rgba(255, 176, 46, 0.35);
    --beach:         #2dd4bf;   /* Teal-Akzent für Beach */
    --beach-glow:    rgba(45, 212, 191, 0.30);
    --radius:        18px;
    --maxw:          1120px;
    --shadow:        0 10px 40px rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,176,46,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(45,212,191,0.08), transparent 55%),
      var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 20px; }

  /* ---------- Header / Nav ---------- */
  header.site-head {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(15, 22, 35, 0.72);
    border-bottom: 1px solid var(--card-border);
  }
  .head-inner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 14px 20px; max-width: var(--maxw); margin: 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand .logo {
    width: 40px; height: 40px; flex-shrink: 0; border-radius: 11px;
    display: grid; place-items: center;
    background: linear-gradient(140deg, var(--accent), #ff8a3d);
    box-shadow: 0 6px 18px var(--accent-glow);
    color: #1a1206;
  }
  .brand .title { font-weight: 800; font-size: 1.02rem; letter-spacing: -0.01em; white-space: nowrap; }
  .brand .title span { color: var(--accent); }
  .brand .sub { font-size: .72rem; color: var(--text-muted); letter-spacing: .14em; text-transform: uppercase; }

  nav.tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  nav.tabs button {
    font: inherit; font-size: .9rem; font-weight: 600;
    color: var(--text-muted); background: transparent;
    border: 1px solid transparent; border-radius: 999px;
    padding: 8px 15px; cursor: pointer;
    transition: all .22s ease;
  }
  nav.tabs button:hover { color: var(--text); background: var(--card); }
  nav.tabs button.active {
    color: var(--accent); background: var(--accent-soft);
    border-color: rgba(255,176,46,0.30);
  }

  /* mobile menu toggle */
  .menu-btn { display: none; background: var(--card); border: 1px solid var(--card-border);
    color: var(--text); border-radius: 11px; padding: 9px; cursor: pointer; }

  /* ---------- Generic page sections ---------- */
  .page { display: none; animation: fade .35s ease; }
  .page.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  section { padding: 30px 0; }
  .section-title {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em;
    margin-bottom: 18px;
  }
  .section-title .ic { color: var(--accent); display: inline-flex; }
  .eyebrow {
    font-size: .74rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }

  /* ---------- Cards ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 22px;
    transition: transform .3s cubic-bezier(.2,.7,.3,1), box-shadow .3s, border-color .3s;
  }
  .card.hoverable:hover {
    transform: translateY(-5px) scale(1.012);
    border-color: rgba(255,176,46,0.40);
    box-shadow: 0 18px 50px rgba(0,0,0,.5), 0 0 0 1px rgba(255,176,46,.15), 0 0 35px var(--accent-glow);
  }

  /* ---------- Countdown ---------- */
  .countdown-bar {
    margin: 22px 0 6px;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 12px;
  }
  .cd-label { width: 100%; text-align: center; color: var(--text-muted);
    font-size: .8rem; letter-spacing: .16em; text-transform: uppercase; margin-bottom: 4px; }
  .cd-box {
    min-width: 78px; text-align: center; padding: 14px 12px;
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 14px; backdrop-filter: blur(8px);
  }
  .cd-num { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; font-variant-numeric: tabular-nums; }
  .cd-unit { font-size: .7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .12em; margin-top: 6px; }
  .cd-done { text-align: center; color: var(--accent); font-weight: 700; font-size: 1.1rem; padding: 14px; }

  /* ---------- Hero ---------- */
  .hero {
    display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 0;
    overflow: hidden; padding: 0;
  }
  .hero .media {
    position: relative; min-height: 260px;
    background: linear-gradient(160deg, #1b2740, #0d1422);
    display: grid; place-items: center;
  }
  .hero .media img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .hero .media .ph {
    color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 10px;
    font-size: .85rem; text-align: center; padding: 20px; z-index: 1;
  }
  .hero .body { padding: 30px; display: flex; flex-direction: column; justify-content: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 7px; align-self: flex-start;
    background: var(--accent-soft); color: var(--accent);
    border: 1px solid rgba(255,176,46,.3); border-radius: 999px;
    padding: 5px 13px; font-size: .76rem; font-weight: 700; letter-spacing: .04em; margin-bottom: 14px;
  }
  .badge.beach { background: rgba(45,212,191,.12); color: var(--beach); border-color: rgba(45,212,191,.3); }
  .hero h1 { font-size: clamp(1.6rem, 4.5vw, 2.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
  .hero .tagline { color: var(--text-muted); margin-top: 10px; font-size: 1rem; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 22px 0; }
  .meta { display: flex; gap: 11px; align-items: flex-start; }
  .meta .ic { color: var(--accent); margin-top: 2px; flex-shrink: 0; }
  .meta .k { font-size: .72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .1em; }
  .meta .v { font-weight: 700; font-size: .98rem; }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    font: inherit; font-weight: 700; font-size: .95rem; cursor: pointer;
    border-radius: 12px; padding: 13px 22px; border: 1px solid transparent;
    text-decoration: none; transition: all .25s ease;
  }
  .btn-primary {
    background: linear-gradient(140deg, var(--accent), #ff8a3d); color: #1a1206;
    box-shadow: 0 8px 24px var(--accent-glow);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 34px var(--accent-glow); }
  .btn-ghost { background: var(--card); color: var(--text); border-color: var(--card-border); }
  .btn-ghost:hover { transform: translateY(-2px); border-color: rgba(255,176,46,.4); color: var(--accent); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 12px; }

  /* ---------- 2-column layout ---------- */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }

  /* Teams list */
  .team-list { list-style: none; display: flex; flex-direction: column; gap: 9px; margin-top: 4px; }
  .team-list li {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; background: rgba(255,255,255,.03);
    border: 1px solid var(--card-border); border-radius: 11px;
    transition: all .2s ease;
  }
  .team-list li:hover { border-color: rgba(255,176,46,.35); transform: translateX(3px); }
  .team-list .num {
    width: 26px; height: 26px; flex-shrink: 0; border-radius: 8px;
    display: grid; place-items: center; font-weight: 800; font-size: .8rem;
    background: var(--accent-soft); color: var(--accent);
  }
  .team-list .nm { font-weight: 600; }
  .team-list .tag { margin-left: auto; font-size: .72rem; color: var(--text-muted); }
  .slots-info { margin-top: 14px; font-size: .85rem; color: var(--text-muted); }
  .slots-bar { height: 8px; border-radius: 99px; background: rgba(255,255,255,.08); overflow: hidden; margin-top: 8px; }
  .slots-bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), #ff8a3d); border-radius: 99px; }

  /* info rows */
  .info-row { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px dashed var(--card-border); }
  .info-row:last-child { border-bottom: none; }
  .info-row .ic { color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  .info-row .k { font-size: .76rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }
  .info-row .v { font-weight: 600; }
  ul.rules { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  ul.rules li { display: flex; gap: 11px; }
  ul.rules .ic { color: var(--accent); flex-shrink: 0; }

  /* ---------- Past tournament ---------- */
  .past { display: flex; flex-wrap: wrap; align-items: center; gap: 18px; justify-content: space-between; }
  .past .txt { flex: 1; min-width: 220px; }

  /* ---------- Category toggle (Halle vs Beach) ---------- */
  .cat-switch {
    display: inline-flex; padding: 5px; gap: 5px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--card-border); margin-bottom: 22px;
  }
  .cat-switch button {
    font: inherit; font-weight: 700; font-size: .9rem; cursor: pointer;
    border: none; border-radius: 999px; padding: 9px 20px; color: var(--text-muted);
    background: transparent; transition: all .25s ease;
  }
  .cat-switch button.active.halle { background: var(--accent-soft); color: var(--accent); box-shadow: inset 0 0 0 1px rgba(255,176,46,.3); }
  .cat-switch button.active.beach { background: rgba(45,212,191,.12); color: var(--beach); box-shadow: inset 0 0 0 1px rgba(45,212,191,.3); }
  .cat-panel { display: none; animation: fade .35s ease; }
  .cat-panel.active { display: block; }
  .cat-card { display: grid; grid-template-columns: 1fr 1.2fr; gap: 0; overflow: hidden; padding: 0; }
  .cat-card .visual { min-height: 220px; position: relative; display: grid; place-items: center; }
  .cat-card .visual.halle { background: linear-gradient(160deg, #2a1d05, #16100a); }
  .cat-card .visual.beach { background: linear-gradient(160deg, #052e2a, #0a1a18); }
  .cat-card .visual .big-ic { opacity: .85; }
  .cat-card .visual.halle .big-ic { color: var(--accent); }
  .cat-card .visual.beach .big-ic { color: var(--beach); }
  .cat-card .content { padding: 26px; }
  .cat-card h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .chip { font-size: .8rem; font-weight: 600; padding: 6px 12px; border-radius: 999px;
    background: rgba(255,255,255,.05); border: 1px solid var(--card-border); color: var(--text-muted); }
  .cat-panel.beach .chip { border-color: rgba(45,212,191,.25); }

  /* ---------- Vision / Values ---------- */
  .values { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .value-card { text-align: center; }
  .value-card .vic {
    width: 56px; height: 56px; margin: 0 auto 14px; border-radius: 16px;
    display: grid; place-items: center; color: var(--accent);
    background: var(--accent-soft); border: 1px solid rgba(255,176,46,.25);
  }
  .value-card h3 { font-size: 1.08rem; font-weight: 800; margin-bottom: 6px; }
  .value-card p { color: var(--text-muted); font-size: .92rem; }

  /* ---------- About / Contact / FAQ / Gallery ---------- */
  .lead { font-size: 1.05rem; color: var(--text-muted); max-width: 720px; }
  .prose p { color: var(--text-muted); margin-bottom: 14px; }
  .prose strong { color: var(--text); }

  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: .8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: .04em; }
  .field input, .field textarea {
    width: 100%; font: inherit; color: var(--text);
    background: rgba(255,255,255,.04); border: 1px solid var(--card-border);
    border-radius: 11px; padding: 12px 14px; transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field textarea { resize: vertical; min-height: 110px; }
  .contact-person { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px dashed var(--card-border); }
  .contact-person:last-child { border-bottom: none; }
  .contact-person .av { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    display: grid; place-items: center; font-weight: 800; background: var(--accent-soft); color: var(--accent); }

  .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .gallery-grid a { aspect-ratio: 4/3; border-radius: 14px; overflow: hidden; border: 1px solid var(--card-border);
    display: grid; place-items: center; background: linear-gradient(160deg, #1b2740, #0d1422); color: var(--text-muted);
    text-decoration: none; transition: all .3s ease; font-size: .85rem; gap: 8px; flex-direction: column; }
  .gallery-grid a:hover { transform: translateY(-4px); border-color: rgba(255,176,46,.4); box-shadow: 0 14px 36px rgba(0,0,0,.5), 0 0 25px var(--accent-glow); color: var(--accent); }

  .faq-item { border-bottom: 1px solid var(--card-border); }
  .faq-q { width: 100%; text-align: left; font: inherit; font-weight: 700; font-size: 1rem; color: var(--text);
    background: none; border: none; cursor: pointer; padding: 18px 0; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .faq-q .chev { color: var(--accent); transition: transform .3s ease; flex-shrink: 0; }
  .faq-item.open .chev { transform: rotate(180deg); }
  .faq-a { max-height: 0; overflow: hidden; transition: max-height .35s ease, padding .35s ease; color: var(--text-muted); }
  .faq-item.open .faq-a { max-height: 320px; padding-bottom: 18px; }

  /* ---------- Footer ---------- */
  footer.site-foot { border-top: 1px solid var(--card-border); margin-top: 40px; padding: 28px 0; color: var(--text-muted); font-size: .88rem; }
  .foot-inner { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px) {
    .hero { grid-template-columns: 1fr; }
    .hero .media { min-height: 200px; order: -1; }
    .cat-card { grid-template-columns: 1fr; }
    .cat-card .visual { min-height: 150px; }
    .grid-2, .contact-grid { grid-template-columns: 1fr; }
    .values { grid-template-columns: 1fr; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 680px) {
    nav.tabs { position: fixed; inset: 64px 12px auto 12px; flex-direction: column;
      background: rgba(15,22,35,.96); border: 1px solid var(--card-border); border-radius: 16px;
      padding: 10px; box-shadow: var(--shadow); display: none; backdrop-filter: blur(14px); }
    nav.tabs.open { display: flex; }
    nav.tabs button { text-align: left; }
    .menu-btn { display: inline-flex; }
    .meta-grid { grid-template-columns: 1fr; }
    .brand .sub { display: none; }
  }
  .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
</style>
</head>

<body>
<!-- ============================================================= -->
<!--  HEADER / NAVIGATION  (Inhalt wird per JS gefüllt)             -->
<!-- ============================================================= -->
<header class="site-head">
  <div class="head-inner">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
      </span>
      <div>
        <div class="title" id="brandTitle"></div>
        <div class="sub" id="brandSub"></div>
      </div>
    </div>
    <button class="menu-btn" id="menuBtn" aria-label="Menü öffnen" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <nav class="tabs" id="navTabs" aria-label="Hauptnavigation"></nav>
  </div>
</header>

<main class="wrap" id="app">
  <!-- ===================== START / HOME ===================== -->
  <div class="page active" id="page-home" role="region" aria-label="Startseite">

    <!-- Countdown -->
    <section aria-label="Countdown bis zum nächsten Turnier">
      <div class="countdown-bar">
        <div class="cd-label" id="cdLabel"></div>
        <div id="countdown"></div>
      </div>
    </section>

    <!-- Hero: Nächstes Turnier -->
    <section aria-label="Nächstes Turnier">
      <article class="card hoverable hero" id="hero"></article>
    </section>

    <!-- Detail-Infos: 2-Spalten -->
    <section id="detailsAnchor" aria-label="Turnierdetails">
      <h2 class="section-title"><span class="ic" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </span>Alle Infos zum Turnier</h2>
      <div class="grid-2">
        <article class="card hoverable" id="cardInfo"></article>
        <article class="card hoverable" id="cardRules"></article>
      </div>
      <div class="grid-2" style="margin-top:18px;">
        <article class="card hoverable" id="cardTeams"></article>
        <article class="card hoverable" id="cardBuffet"></article>
      </div>
    </section>

    <!-- Rückblick (zeitgesteuert) -->
    <section id="pastSection" aria-label="Rückblick vergangenes Turnier" style="display:none;">
      <h2 class="section-title"><span class="ic" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
      </span>Rückblick</h2>
      <article class="card hoverable past" id="pastCard"></article>
    </section>

    <!-- Kategorien: Halle vs Beach -->
    <section aria-label="Turnier-Kategorien">
      <p class="eyebrow">Zwei Welten</p>
      <h2 class="section-title"><span class="ic" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
      </span>Halle &amp; Beach</h2>
      <div class="cat-switch" role="tablist" aria-label="Turnierart wählen">
        <button class="halle active" data-cat="halle" role="tab" aria-selected="true">🏟 Halle</button>
        <button class="beach" data-cat="beach" role="tab" aria-selected="false">🏖 Beach</button>
      </div>
      <div class="cat-panel active" id="panel-halle"></div>
      <div class="cat-panel beach" id="panel-beach"></div>
    </section>

    <!-- Vision / Werte -->
    <section aria-label="Unsere Vision und Werte">
      <p class="eyebrow">Warum wir das tun</p>
      <h2 class="section-title"><span class="ic" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06z"/></svg>
      </span>Unsere Vision</h2>
      <div class="values" id="valuesGrid"></div>
    </section>
  </div>

  <!-- ===================== ÜBER UNS ===================== -->
  <div class="page" id="page-about" role="region" aria-label="Über uns">
    <section>

/* ---------- mailto Link bauen ---------- */
function buildMailto(reg, teamPlaceholder) {
  const subj = (reg.subject || "").replace("[Teamname]", teamPlaceholder || "");
  const params = [];
  if (subj) params.push("subject=" + encodeURIComponent(subj));
  if (reg.bodyTemplate) params.push("body=" + encodeURIComponent(reg.bodyTemplate));
  return "mailto:" + reg.email + (params.length ? "?" + params.join("&") : "");
}

  { id:"contact", label:"Kontakt" }
];
function renderNav() {
  const nav = $("#navTabs");
  nav.innerHTML = "";
  PAGES.forEach(p => {
    const b = el("button", "", p.label);
    b.dataset.page = p.id;
    b.addEventListener("click", () => { showPage(p.id); nav.classList.remove("open"); });
    nav.appendChild(b);
  });
}
function showPage(id) {
  $$(".page").forEach(p => p.classList.toggle("active", p.id === "page-" + id));
  $$("#navTabs button").forEach(b => b.classList.toggle("active", b.dataset.page === id));
  window.scrollTo({ top: 0, behavior: "smooth" });
}

    '<div class="txt">' +
      '<span class="badge">Rückblick · ' + p.dateLabel + '</span>' +
      '<h3 style="font-size:1.25rem;font-weight:800;margin:6px 0 8px;">' + p.name + '</h3>' +
      '<p style="color:var(--text-muted);">' + p.summary + '</p>' +
      (p.winner ? '<p style="margin-top:10px;display:flex;align-items:center;gap:8px;color:var(--accent);font-weight:700;"><span class="ic">' + ICON.trophy + '</span>Sieger: ' + p.winner + '</p>' : '') +
    '</div>' +
    '<a class="btn btn-primary" id="pastGalleryBtn" href="' + p.galleryUrl + '">' + ICON.image + ' Zu den Bildern</a>';

  const btn = $("#pastGalleryBtn");
  if (p.galleryUrl === "#gallery") {
    btn.addEventListener("click", (e) => { e.preventDefault(); showPage("gallery"); });
  }
}

/* Kategorien Halle/Beach */
function renderCategories() {
  const c = DATA.categories;
  $("#panel-halle").innerHTML = catCard("halle", c.halle);
  $("#panel-beach").innerHTML = catCard("beach", c.beach);
  $$(".cat-switch button").forEach(b => {
    b.addEventListener("click", () => {
      const cat = b.dataset.cat;
      $$(".cat-switch button").forEach(x => { x.classList.remove("active"); x.setAttribute("aria-selected", "false"); });
      b.classList.add("active"); b.setAttribute("aria-selected", "true");
      $("#panel-halle").classList.toggle("active", cat === "halle");
      $("#panel-beach").classList.toggle("active", cat === "beach");
    });
  });
}
function catCard(type, data) {
  const ic = type === "halle" ? ICON.hall : ICON.beach;
  return '<article class="card hoverable cat-card">' +
    '<div class="visual ' + type + '"><span class="big-ic">' + ic + '</span></div>' +
    '<div class="content">' +
      '<h3>' + data.title + '</h3>' +
      '<p style="color:var(--text-muted);">' + data.desc + '</p>' +
      '<div class="chip-row">' + data.features.map(f => '<span class="chip">' + f + '</span>').join("") + '</div>' +
    '</div></article>';
}

/* Vision / Werte */
function renderValues() {
  $("#valuesGrid").innerHTML = DATA.values.map((v, i) =>
    '<article class="card hoverable value-card">' +
      '<div class="vic">' + (VALUE_ICONS[i] || ICON.heart) + '</div>' +
      '<h3>' + v.title + '</h3><p>' + v.text + '</p>' +
    '</article>'
  ).join("");
}

/* Über uns */
function renderAbout() {
  $("#aboutTitle").textContent = DATA.about.title;
  $("#aboutCard").innerHTML = DATA.about.paragraphs.map(p => '<p>' + p + '</p>').join("");
}

/* Kontakt */
function renderContact() {
  $("#contactPeople").innerHTML =
    '<h3 style="font-size:1.1rem;font-weight:800;margin-bottom:10px;">Ansprechpartner</h3>' +
    DATA.contactPeople.map(p =>
      '<div class="contact-person">' +
        '<span class="av">' + initials(p.name) + '</span>' +
        '<div><div style="font-weight:700;">' + p.name + '</div>' +
        '<div style="font-size:.85rem;color:var(--text-muted);">' + p.role + '</div>' +
        '<a href="mailto:' + p.email + '" style="font-size:.85rem;color:var(--accent);text-decoration:none;">' + p.email + '</a></div>' +
      '</div>'
    ).join("");

  $("#contactForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const name = $("#cf-name").value.trim();
    const mail = $("#cf-mail").value.trim();
    const msg  = $("#cf-msg").value.trim();
    const subject = "Kontaktanfrage von " + (name || "Website-Besucher");
    const body = msg + "\n\n— " + name + (mail ? " (" + mail + ")" : "");
    window.location.href = "mailto:" + DATA.brand.contactEmail +
      "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
  });
}
function initials(n) { return n.split(" ").map(w => w[0]).slice(0,2).join("").toUpperCase(); }

/* Galerie */
function renderGallery() {
  $("#galleryLead").textContent = DATA.gallery.lead;
  $("#galleryGrid").innerHTML = DATA.gallery.albums.map(a =>
    '<a href="' + a.url + '"' + (a.url.startsWith("http") ? ' target="_blank" rel="noopener"' : '') + '>' +
      ICON.image + '<span>' + a.label + '</span></a>'
  ).join("");
}

/* FAQ */
function renderFaq() {
  $("#faqCard").innerHTML = DATA.faq.map(f =>
    '<div class="faq-item">' +
      '<button class="faq-q" aria-expanded="false">' + f.q + '<span class="chev">' + ICON.chev + '</span></button>' +
      '<div class="faq-a"><p>' + f.a + '</p></div>' +
    '</div>'
  ).join("");
  $$(".faq-q").forEach(btn => {
    btn.addEventListener("click", () => {
      const item = btn.parentElement;
      const open = item.classList.toggle("open");
      btn.setAttribute("aria-expanded", open ? "true" : "false");
    });
  });
}

/* ---------- Countdown ---------- */
function startCountdown() {
  const t = DATA.nextTournament;
  $("#cdLabel").textContent = "Countdown bis " + t.name;
  const target = new Date(t.startDateTime).getTime();
  const box = $("#countdown");

  function tick() {
    const diff = target - Date.now();
    if (isNaN(target)) { box.innerHTML = '<div class="cd-done">Datum prüfen</div>'; return; }
    if (diff <= 0) { box.innerHTML = '<div class="cd-done">🎉 Das Turnier läuft / ist gestartet!</div>'; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    box.innerHTML =
      cdBox(d, "Tage") + cdBox(h, "Std") + cdBox(m, "Min") + cdBox(s, "Sek");
  }
  function cdBox(n, u) {
    return '<span class="cd-box"><span class="cd-num">' + String(n).padStart(2,"0") + '</span><span class="cd-unit">' + u + '</span></span>';
  }
  box.style.display = "flex";
  box.style.flexWrap = "wrap";
  box.style.gap = "12px";
  box.style.justifyContent = "center";
  tick();
  setInterval(tick, 1000);
}

/* ---------- Mobile Menu ---------- */
$("#menuBtn").addEventListener("click", () => {
  const nav = $("#navTabs");
  const open = nav.classList.toggle("open");
  $("#menuBtn").setAttribute("aria-expanded", open ? "true" : "false");
});

/* ---------- INIT ---------- */
document.addEventListener("DOMContentLoaded", () => {
  renderBrand();
  renderNav();
  renderHero();
  renderDetails();
  renderPast();
  renderCategories();
  renderValues();
  renderAbout();
  renderContact();
  renderGallery();
  renderFaq();
  startCountdown();
  showPage("home");
});
</script>
</body>
</html>
